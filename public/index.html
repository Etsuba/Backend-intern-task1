<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuickLink | URL Shortener</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 300px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <input type="text" id="urlInput" placeholder="Paste your long URL here...">
        <button onclick="shortenUrl()">Shorten</button>
        <div id="result"></div>
    </div>

    <script>
        async function shortenUrl() {
            const longUrl = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('result');
            
            const response = await fetch('/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ longUrl })
            });

            const data = await response.json();
            if (data.shortUrl) {
                resDiv.innerHTML = `Success! <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>`;
            } else {
                resDiv.innerText = "Error shortening URL.";
            }
        }
    </script>
</body>
</html>
